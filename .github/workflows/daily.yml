name: bxb-daily-tasks

on:
  workflow_dispatch:
    inputs:
      time_point:
        required: true
        type: choice
        options: ["1", "2", "3", "4"]
      shards:
        required: false
        default: ""
      total_rate:
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      shards: ${{ steps.gen.outputs.shards }}
      total_rate: ${{ steps.gen.outputs.total_rate }}
    steps:
      - id: gen
        run: |
          N="${{ inputs.shards }}"; N="${N:-${{ vars.BXB_RUN_SHARDS }}}"; N="${N:-16}"
          TR="${{ inputs.total_rate }}"; TR="${TR:-${{ vars.BXB_RUN_TOTAL_RATE }}}"; TR="${TR:-8}"
          echo "shards=$N"      >> "$GITHUB_OUTPUT"
          echo "total_rate=$TR" >> "$GITHUB_OUTPUT"
          echo "matrix=[$(seq -s, 0 $((N-1)))]" >> "$GITHUB_OUTPUT"

  run:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch routines code from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "s3://${{ vars.R2_ACCOUNTS_BUCKET }}/routines/" . --recursive \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            --exclude ".git/*" --exclude "scripts/_boot.py" \
            --exclude "data/*" --exclude "outputs/*" \
            --exclude "*.pyc" --exclude "*/__pycache__/*"
      - run: pip install -r requirements-daily.txt
      - name: Fetch accounts + resolve run set (first-run vs re-run) from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          B="s3://${{ vars.R2_ACCOUNTS_BUCKET }}"; E="${{ secrets.R2_ENDPOINT }}"
          aws s3 cp "$B/accounts/saitouena/accounts.csv" accounts.csv --endpoint-url "$E"
          JST=$(TZ=Asia/Tokyo date +%F)
          if aws s3 cp "$B/runstate/${JST}/daily-${{ inputs.time_point }}.csv" outcome.csv --endpoint-url "$E" 2>/dev/null; then
            echo "re-run: hit runstate/${JST}/daily-${{ inputs.time_point }}.csv"
            python -m daily.select_failed --accounts accounts.csv --outcome outcome.csv --out run_accounts.csv
          else
            echo "first run: no runstate/${JST}/daily-${{ inputs.time_point }}.csv"
            cp accounts.csv run_accounts.csv
          fi
      - name: Stagger start (shard×60s + 随机 0-15s)
        run: |
          sleep $(( ${{ matrix.shard }} * 60 ))
          sleep $(( RANDOM % 16 ))
      - name: Run shard
        env:
          PYTHONUNBUFFERED: "1"
          BXB_BOOTSTRAP_KEY: ${{ secrets.BXB_BOOTSTRAP_KEY }}
          BXB_APP_VERSION: ${{ vars.BXB_APP_VERSION }}
          BXB_UNITY_VERSION: ${{ vars.BXB_UNITY_VERSION }}
        run: |
          N="${{ needs.prepare.outputs.shards }}"
          TR="${{ needs.prepare.outputs.total_rate }}"
          CONC="${{ vars.BXB_RUN_CONCURRENCY }}"; CONC="${CONC:-8}"
          python -m daily \
            --time-point ${{ inputs.time_point }} \
            --shard ${{ matrix.shard }}/$N \
            --accounts-file run_accounts.csv \
            --concurrency "$CONC" --rate 3.0 --total-rate "$TR" \
            --out "results-${{ matrix.shard }}.csv" > "shard-${{ matrix.shard }}.log" 2>&1
      - name: Upload results + log to R2 (private)
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        run: |
          B="s3://${{ vars.R2_ACCOUNTS_BUCKET }}"; E="${{ secrets.R2_ENDPOINT }}"
          JST=$(TZ=Asia/Tokyo date +%F)
          [ -f "results-${{ matrix.shard }}.csv" ] && aws s3 cp "results-${{ matrix.shard }}.csv" "$B/results/tp${{ inputs.time_point }}/shard-${{ matrix.shard }}.csv" --endpoint-url "$E" || true
          aws s3 cp "shard-${{ matrix.shard }}.log" "$B/logs/${JST}/tp${{ inputs.time_point }}-shard${{ matrix.shard }}.log" --endpoint-url "$E" || true

  aggregate:
    needs: run
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch routines code from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "s3://${{ vars.R2_ACCOUNTS_BUCKET }}/routines/" . --recursive \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            --exclude ".git/*" --exclude "scripts/_boot.py" \
            --exclude "data/*" --exclude "outputs/*" \
            --exclude "*.pyc" --exclude "*/__pycache__/*"
      - name: Fetch this run's results + prior outcome + base accounts.csv from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        run: |
          B="s3://${{ vars.R2_ACCOUNTS_BUCKET }}"; E="${{ secrets.R2_ENDPOINT }}"
          JST=$(TZ=Asia/Tokyo date +%F)
          mkdir -p merged_results
          aws s3 cp "$B/results/tp${{ inputs.time_point }}/" merged_results/ --recursive --endpoint-url "$E" || true
          aws s3 cp "$B/accounts/saitouena/accounts.csv" accounts.csv --endpoint-url "$E"
          aws s3 cp "$B/runstate/${JST}/daily-${{ inputs.time_point }}.csv" prior.csv --endpoint-url "$E" 2>/dev/null || true
      - name: Build outcome (merge prior + this run) and write to R2 runstate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        run: |
          B="s3://${{ vars.R2_ACCOUNTS_BUCKET }}"; E="${{ secrets.R2_ENDPOINT }}"
          JST=$(TZ=Asia/Tokyo date +%F)
          [ -f prior.csv ] && P="--prior prior.csv" || P=""
          python -m daily.outcome --results-dir merged_results --out outcome.csv $P
          aws s3 cp outcome.csv "$B/runstate/${JST}/daily-${{ inputs.time_point }}.csv" --endpoint-url "$E"
      - name: Merge diamond into accounts.csv (tp1 only), backup + write back to R2
        if: ${{ inputs.time_point == '1' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        run: |
          B="s3://${{ vars.R2_ACCOUNTS_BUCKET }}"; E="${{ secrets.R2_ENDPOINT }}"
          JST_DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          python -m daily.writeback --base accounts.csv --results-dir merged_results --out accounts.new.csv --min-rows 1
          aws s3 cp accounts.csv "$B/accounts/saitouena/accounts-${JST_DATE}.csv" --endpoint-url "$E"
          aws s3 cp accounts.new.csv "$B/accounts/saitouena/accounts.csv" --endpoint-url "$E"
      - name: Union rarity4 into accounts.csv (tp4 only), backup + write back to R2
        if: ${{ inputs.time_point == '4' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        run: |
          B="s3://${{ vars.R2_ACCOUNTS_BUCKET }}"; E="${{ secrets.R2_ENDPOINT }}"
          JST_DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          python -m daily.writeback --base accounts.csv --results-dir merged_results --out accounts.new.csv --min-rows 1 --results-col rarity4 --base-col rarity4_base_ids --mode union --sep " "
          aws s3 cp accounts.csv "$B/accounts/saitouena/accounts-${JST_DATE}-daily4.csv" --endpoint-url "$E"
          aws s3 cp accounts.new.csv "$B/accounts/saitouena/accounts.csv" --endpoint-url "$E"
      - name: Delete this run's results from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          B="s3://${{ vars.R2_ACCOUNTS_BUCKET }}"; E="${{ secrets.R2_ENDPOINT }}"
          aws s3 rm "$B/results/tp${{ inputs.time_point }}/" --recursive --endpoint-url "$E" || true

  cleanup-old-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete previous daily runs (keep current)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "/repos/${{ github.repository }}/actions/workflows/daily.yml/runs?per_page=100" \
            --jq '.workflow_runs[].id' | while read -r id; do
              [ "$id" = "${{ github.run_id }}" ] && continue
              echo "delete run $id"
              gh api -X DELETE "/repos/${{ github.repository }}/actions/runs/$id" || true
            done
